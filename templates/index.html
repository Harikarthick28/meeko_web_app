<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeko — Analyze Your Mood</title>
    <meta name="description" content="Tell Meeko how you feel and get personalized music recommendations across platforms and languages.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --peach: #FFDAC6;
            --lavender: #E8D5F5;
            --mint: #D0F0E0;
            --sky: #D6ECFA;
            --blush: #FFD6E0;
            --cream: #FFF8F0;
            --text: #2D2A3E;
            --text-soft: #6B6580;
            --text-muted: #9E96B0;
            --white: #FFFFFF;
            --card: rgba(255,255,255,0.65);
            --card-border: rgba(0,0,0,0.05);
            --accent-pink: #E87B9A;
            --accent-purple: #A78BFA;
            --accent-gradient: linear-gradient(135deg, #E87B9A, #C57ADB);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: linear-gradient(160deg, var(--cream) 0%, var(--sky) 30%, var(--lavender) 60%, var(--blush) 100%);
            background-attachment: fixed;
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Nav --- */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 1rem 2.5rem;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }
        .nav-brand {
            font-size: 1.35rem; font-weight: 700;
            background: linear-gradient(135deg, #E87B9A, #A78BFA);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { color: var(--text-soft); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
        .nav-links a:hover { color: var(--text); }

        /* --- Layout --- */
        .app-container {
            max-width: 620px;
            margin: 0 auto;
            padding: 6.5rem 1.5rem 4rem;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.35rem;
        }

        .page-subtitle {
            color: var(--text-soft);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        /* --- Input Card --- */
        .input-card {
            background: var(--card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.75rem;
            margin-bottom: 1.25rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.04);
        }

        .input-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 0.75rem;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 1rem 1.15rem;
            background: rgba(255,255,255,0.7);
            border: 1.5px solid rgba(0,0,0,0.06);
            border-radius: 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.65;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea:focus {
            border-color: rgba(167,139,250,0.4);
            box-shadow: 0 0 0 4px rgba(167,139,250,0.08);
        }
        textarea::placeholder { color: var(--text-muted); }

        /* --- Camera --- */
        .camera-section {
            margin-top: 1.25rem;
            padding-top: 1.25rem;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .camera-toggle {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.6rem 1.1rem;
            background: rgba(255,255,255,0.7);
            border: 1.5px solid rgba(0,0,0,0.06);
            border-radius: 10px;
            color: var(--text-soft);
            font-family: inherit; font-size: 0.85rem; font-weight: 500;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }
        .camera-toggle:hover { border-color: rgba(167,139,250,0.3); color: var(--text); }
        .camera-toggle.active {
            border-color: var(--accent-purple);
            color: var(--accent-purple);
            background: rgba(167,139,250,0.08);
        }

        .camera-preview { margin-top: 1rem; display: none; }
        .camera-preview.visible { display: block; }
        .camera-preview video {
            width: 240px; height: 180px;
            border-radius: 14px; background: #f0f0f0; object-fit: cover;
            border: 1.5px solid rgba(0,0,0,0.06);
        }
        .camera-preview canvas { display: none; }

        .capture-btn {
            margin-top: 0.75rem;
            padding: 0.5rem 1rem;
            background: var(--accent-gradient);
            border: none; border-radius: 10px;
            color: white; font-family: inherit; font-size: 0.85rem; font-weight: 500;
            cursor: pointer; transition: transform 0.15s, box-shadow 0.2s;
        }
        .capture-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(200,122,219,0.2); }

        .face-result { margin-top: 0.75rem; font-size: 0.85rem; color: var(--text-soft); }
        .face-result .detected-mood { font-weight: 600; color: #9B72CF; }

        /* --- Analyze Button --- */
        .analyze-btn {
            width: 100%;
            padding: 0.95rem;
            background: var(--accent-gradient);
            border: none; border-radius: 14px;
            color: white; font-family: inherit; font-size: 1rem; font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 8px 30px rgba(200,122,219,0.2);
            margin-bottom: 1.5rem;
        }
        .analyze-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(200,122,219,0.3); }
        .analyze-btn:active { transform: translateY(0); }
        .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        /* --- Loading --- */
        .loading { display: none; text-align: center; padding: 1.5rem; color: var(--text-soft); font-size: 0.9rem; }
        .loading.visible { display: block; }
        .spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 2px solid rgba(0,0,0,0.08); border-top-color: var(--accent-purple);
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin-right: 0.5rem; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- Language Selection --- */
        .language-section {
            display: none;
            background: var(--card); backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px; padding: 1.75rem; margin-bottom: 1.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.04);
            animation: fadeIn 0.3s ease;
        }
        .language-section.visible { display: block; }

        .section-heading { font-size: 1.15rem; font-weight: 600; margin-bottom: 0.35rem; }
        .section-desc { color: var(--text-soft); font-size: 0.88rem; margin-bottom: 1.25rem; }

        .language-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
            gap: 0.55rem; margin-bottom: 1.25rem;
        }

        .lang-option {
            padding: 0.65rem 0.5rem;
            background: rgba(255,255,255,0.7);
            border: 1.5px solid rgba(0,0,0,0.05);
            border-radius: 12px;
            text-align: center; cursor: pointer;
            transition: border-color 0.2s, background 0.2s, transform 0.15s;
            user-select: none;
        }
        .lang-option:hover { border-color: rgba(167,139,250,0.25); transform: translateY(-1px); }
        .lang-option.selected {
            border-color: var(--accent-purple);
            background: rgba(167,139,250,0.1);
            transform: translateY(-1px);
        }

        .lang-code {
            display: block; font-size: 0.68rem; font-weight: 700;
            color: var(--text-muted); letter-spacing: 0.05em; margin-bottom: 0.2rem;
        }
        .lang-option.selected .lang-code { color: var(--accent-purple); }
        .lang-name { font-size: 0.82rem; font-weight: 500; }

        .continue-btn {
            width: 100%; padding: 0.85rem;
            background: var(--accent-gradient);
            border: none; border-radius: 14px;
            color: white; font-family: inherit; font-size: 0.95rem; font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
            box-shadow: 0 6px 24px rgba(200,122,219,0.15);
        }
        .continue-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 32px rgba(200,122,219,0.25); }
        .continue-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

        /* --- Results --- */
        .results-section { display: none; animation: fadeIn 0.4s ease; }
        .results-section.visible { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fortune-card {
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            color: white;
            box-shadow: 0 12px 40px rgba(0,0,0,0.1);
        }

        .fortune-mood {
            display: inline-block;
            font-size: 0.72rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
            padding: 0.3rem 0.9rem;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            margin-bottom: 1rem;
        }

        .fortune-text { font-size: 1.15rem; font-weight: 500; line-height: 1.7; }

        .signals-bar {
            display: flex; gap: 1rem; margin-top: 1.25rem;
            padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.15);
            font-size: 0.8rem; opacity: 0.75;
        }
        .signal-item { display: flex; align-items: center; gap: 0.35rem; }
        .signal-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.6); }

        /* --- Platforms --- */
        .platforms-heading {
            font-size: 0.78rem; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.8rem;
        }

        .platforms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 0.6rem; margin-bottom: 2rem;
        }

        .platform-btn {
            padding: 0.85rem; border: none; border-radius: 14px;
            color: white; font-family: inherit; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: transform 0.15s, box-shadow 0.2s;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .platform-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }

        /* --- Playlists --- */
        .playlist-group { margin-bottom: 1.5rem; }
        .playlist-lang {
            font-size: 0.85rem; font-weight: 600;
            margin-bottom: 0.6rem; padding-bottom: 0.4rem;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }
        .playlist-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .playlist-chip {
            padding: 0.45rem 0.9rem;
            background: var(--card); border: 1px solid var(--card-border);
            border-radius: 20px; font-size: 0.82rem;
            color: var(--text-soft); font-weight: 500;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }
        .playlist-chip:hover {
            border-color: rgba(167,139,250,0.25); color: var(--text);
            background: rgba(255,255,255,0.8);
        }

        /* --- Reset --- */
        .reset-btn {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.6rem 1.2rem;
            background: var(--card); border: 1px solid var(--card-border);
            border-radius: 10px; color: var(--text-soft);
            font-family: inherit; font-size: 0.85rem; font-weight: 500;
            cursor: pointer; transition: border-color 0.2s, color 0.2s;
            margin-top: 1rem;
        }
        .reset-btn:hover { border-color: rgba(167,139,250,0.25); color: var(--text); }

        @media (max-width: 640px) {
            nav { padding: 0.8rem 1.2rem; }
            .nav-links { gap: 1.2rem; }
            .app-container { padding-top: 5.5rem; }
            .language-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
            .platforms-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand">Meeko</div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/app">Try Meeko</a></li>
            <li><a href="/about">About</a></li>
        </ul>
    </nav>

    <div class="app-container">
        <h1 class="page-title">How are you feeling?</h1>
        <p class="page-subtitle">Write it out, or let your camera do the talking.</p>

        <div class="input-card" id="inputCard">
            <label class="input-label" for="moodText">What's on your mind</label>
            <textarea id="moodText" placeholder="I've been feeling... (write freely, there's no wrong answer)"></textarea>

            <div class="camera-section">
                <button class="camera-toggle" id="cameraToggle" onclick="toggleCamera()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.04l-.821 1.316z" /><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z" /></svg>
                    Enable Camera
                </button>
                <div class="camera-preview" id="cameraPreview">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="canvas" width="240" height="180"></canvas>
                    <br>
                    <button class="capture-btn" onclick="captureImage()">Capture & Analyze Face</button>
                    <div class="face-result" id="faceResult"></div>
                </div>
            </div>
        </div>

        <button class="analyze-btn" id="analyzeBtn" onclick="analyzeMood()">Analyze My Mood</button>
        <div class="loading" id="loading"><span class="spinner"></span> Analyzing your emotional state...</div>

        <div class="language-section" id="languageSection">
            <h2 class="section-heading">Choose your music languages</h2>
            <p class="section-desc">Select one or more languages for your recommendations.</p>
            <div class="language-grid" id="languageGrid"></div>
            <button class="continue-btn" id="continueBtn" onclick="showResults()" disabled>Continue to Music</button>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="fortune-card" id="fortuneCard">
                <div class="fortune-mood" id="fortuneMood"></div>
                <div class="fortune-text" id="fortuneText"></div>
                <div class="signals-bar" id="signalsBar"></div>
            </div>
            <div class="platforms-heading">Listen on</div>
            <div class="platforms-grid" id="platformsGrid"></div>
            <div id="playlistsContainer"></div>
            <button class="reset-btn" onclick="resetAll()">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182" /></svg>
                Start Over
            </button>
        </div>
    </div>

    <script>
        let currentMoodData = null;
        let selectedLanguages = [];
        let availableLanguages = {};
        let cameraStream = null;
        let cameraEnabled = false;
        let capturedImageData = null;

        window.addEventListener('load', loadLanguages);

        async function loadLanguages() {
            try {
                const res = await fetch('https://meeko-song-player.onrender.com/languages');
                availableLanguages = await res.json();
                buildLanguageGrid();
            } catch (err) { console.error('Failed to load languages:', err); }
        }

        function buildLanguageGrid() {
            const grid = document.getElementById('languageGrid');
            grid.innerHTML = '';
            Object.entries(availableLanguages).forEach(([code, lang]) => {
                const el = document.createElement('div');
                el.className = 'lang-option';
                el.dataset.lang = code;
                el.innerHTML = `<span class="lang-code">${lang.flag}</span><span class="lang-name">${lang.name}</span>`;
                el.onclick = () => toggleLanguage(code, el);
                grid.appendChild(el);
            });
        }

        function toggleLanguage(code, el) {
            if (selectedLanguages.includes(code)) {
                selectedLanguages = selectedLanguages.filter(l => l !== code);
                el.classList.remove('selected');
            } else {
                selectedLanguages.push(code);
                el.classList.add('selected');
            }
            document.getElementById('continueBtn').disabled = selectedLanguages.length === 0;
        }

        async function toggleCamera() {
            const btn = document.getElementById('cameraToggle');
            const preview = document.getElementById('cameraPreview');
            if (!cameraEnabled) {
                try {
                    cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    document.getElementById('video').srcObject = cameraStream;
                    preview.classList.add('visible');
                    btn.classList.add('active');
                    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.04l-.821 1.316z" /><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z" /></svg> Camera Active`;
                    cameraEnabled = true;
                } catch (err) { document.getElementById('faceResult').textContent = 'Camera access denied.'; }
            } else {
                if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
                preview.classList.remove('visible');
                btn.classList.remove('active');
                btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.04l-.821 1.316z" /><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z" /></svg> Enable Camera`;
                cameraEnabled = false;
                capturedImageData = null;
            }
        }

        function captureImage() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 240, 180);
            capturedImageData = canvas.toDataURL('image/jpeg');
            const resultEl = document.getElementById('faceResult');
            resultEl.textContent = 'Analyzing face...';
            fetch('https://meeko-song-player.onrender.com/capture-face', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: capturedImageData })
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) { resultEl.textContent = data.error; }
                else { resultEl.innerHTML = `Detected: <span class="detected-mood">${data.emotion}</span> (${data.accuracy} confidence)`; }
            })
            .catch(() => { resultEl.textContent = 'Face detection failed.'; });
        }

        async function analyzeMood() {
            const text = document.getElementById('moodText').value;
            const loading = document.getElementById('loading');
            const analyzeBtn = document.getElementById('analyzeBtn');
            loading.classList.add('visible');
            analyzeBtn.disabled = true;
            document.getElementById('languageSection').classList.remove('visible');
            document.getElementById('resultsSection').classList.remove('visible');
            try {
                const body = { text };
                if (capturedImageData) body.image = capturedImageData;
                const res = await fetch('https://meeko-song-player.onrender.com/analyze', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (!res.ok) throw new Error('Analysis failed');
                currentMoodData = await res.json();
                showLanguageSelection();
            } catch (err) { console.error(err); alert('Something went wrong. Please try again.'); }
            loading.classList.remove('visible');
            analyzeBtn.disabled = false;
        }

        function showLanguageSelection() {
            document.getElementById('resultsSection').classList.remove('visible');
            document.getElementById('languageSection').classList.add('visible');
            selectedLanguages = [];
            document.querySelectorAll('.lang-option').forEach(el => el.classList.remove('selected'));
            document.getElementById('continueBtn').disabled = true;
        }

        async function showResults() {
            if (selectedLanguages.length === 0) return;
            const loading = document.getElementById('loading');
            loading.classList.add('visible');
            try {
                const body = { text: document.getElementById('moodText').value, languages: selectedLanguages };
                if (capturedImageData) body.image = capturedImageData;
                const res = await fetch('https://meeko-song-player.onrender.com/analyze', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (!res.ok) throw new Error('Analysis failed');
                const data = await res.json();
                renderResults(data);
                document.getElementById('languageSection').classList.remove('visible');
            } catch (err) { console.error(err); }
            loading.classList.remove('visible');
        }

        function renderResults(data) {
            const section = document.getElementById('resultsSection');
            const card = document.getElementById('fortuneCard');
            card.style.background = data.gradient;
            document.getElementById('fortuneMood').textContent = data.mood.toUpperCase();
            document.getElementById('fortuneText').textContent = data.fortune;

            const signals = document.getElementById('signalsBar');
            const parts = [];
            if (data.signals.text) parts.push(`Text: ${data.signals.text}`);
            if (data.signals.face && data.signals.face_confidence)
                parts.push(`Face: ${data.signals.face} (${(data.signals.face_confidence * 100).toFixed(0)}%)`);
            signals.innerHTML = parts.map(s => `<div class="signal-item"><span class="signal-dot"></span>${s}</div>`).join('');

            const grid = document.getElementById('platformsGrid');
            grid.innerHTML = '';
            Object.entries(data.platforms).forEach(([key, p]) => {
                const btn = document.createElement('button');
                btn.className = 'platform-btn';
                btn.style.backgroundColor = p.color;
                btn.textContent = p.name;
                btn.onclick = () => openPlatform(key, data.mood, data.selected_languages);
                grid.appendChild(btn);
            });

            const container = document.getElementById('playlistsContainer');
            container.innerHTML = '';
            if (data.playlists && Object.keys(data.playlists).length > 0) {
                Object.entries(data.playlists).forEach(([lang, playlists]) => {
                    const group = document.createElement('div');
                    group.className = 'playlist-group';
                    const langName = availableLanguages[lang]?.name || lang;
                    group.innerHTML = `<div class="playlist-lang">${langName}</div>`;
                    const chips = document.createElement('div');
                    chips.className = 'playlist-chips';
                    playlists.forEach(p => {
                        const chip = document.createElement('span');
                        chip.className = 'playlist-chip';
                        chip.textContent = p;
                        chips.appendChild(chip);
                    });
                    group.appendChild(chips);
                    container.appendChild(group);
                });
            }
            section.classList.add('visible');
        }

        function openPlatform(platform, mood, languages) {
            const urls = {
                'spotify': 'https://open.spotify.com/search/',
                'jiosaavn': 'https://www.jiosaavn.com/search/',
                'youtube': 'https://music.youtube.com/search?q=',
                'apple': 'https://music.apple.com/search?term=',
                'amazon': 'https://music.amazon.com/search/',
                'gaana': 'https://gaana.com/search/'
            };
            const langNames = (languages || []).map(l => availableLanguages[l]?.name || l).join(' ');
            const q = `${mood} ${langNames} music`.trim();
            window.open(urls[platform] + encodeURIComponent(q), '_blank');
        }

        function resetAll() {
            document.getElementById('moodText').value = '';
            document.getElementById('resultsSection').classList.remove('visible');
            document.getElementById('languageSection').classList.remove('visible');
            document.getElementById('faceResult').textContent = '';
            capturedImageData = null; currentMoodData = null; selectedLanguages = [];
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('moodText').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); analyzeMood(); }
        });
    </script>
</body>
</html>
